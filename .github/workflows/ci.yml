name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Expreszo.slnx

      - name: Build (Release)
        run: dotnet build Expreszo.slnx --configuration Release --no-restore

      - name: Test
        # TUnit runs on Microsoft Testing Platform (MTP); .NET 10 removed
        # VSTest support from `dotnet test`, so we invoke the test assembly
        # through `dotnet run` which is the MTP-native entry point.
        # The treenode-filter pattern is quoted so bash does not glob-expand
        # `/*/*/*/*` against the runner's filesystem before it reaches TUnit.
        run: dotnet run --project test/Expreszo.Tests/Expreszo.Tests.csproj --configuration Release --no-build -- --treenode-filter '/*/*/*/*'

      - name: Pack
        run: dotnet pack src/Expreszo/Expreszo.csproj --configuration Release --no-build --output ./artifacts

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: ./artifacts/*.nupkg

  aot-canary:
    # Separate job so AOT failures are clearly attributed and don't mask
    # test failures. Publishes the AotCheck sample with PublishAot=true; any
    # AOT analyzer warning in the library surfaces here as a build failure.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish AotCheck (Native AOT)
        run: |
          dotnet publish samples/AotCheck/AotCheck.csproj \
            --configuration Release \
            --runtime linux-x64 \
            --self-contained \
            -p:PublishAot=true \
            --output ./aot-out

      - name: Run the AOT-published binary
        run: ./aot-out/Expreszo.AotCheck
