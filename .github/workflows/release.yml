name: Release

on:
  push:
    tags:
      # Triggered by pushing an annotated tag of the form vMAJOR.MINOR.PATCH
      # (e.g. v1.0.0) or a pre-release tag (e.g. v1.0.0-beta.1).
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
  workflow_dispatch:
    # Manual runs are allowed so a maintainer can re-run a failed publish
    # without having to re-tag; MinVer still reads the version from the most
    # recent tag on the commit.

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  release:
    runs-on: ubuntu-latest

    # The `nuget` environment can be configured with required-reviewer
    # protection in the repo's GitHub settings so package pushes need an
    # explicit approval. The NUGET_API_KEY secret is expected to live on
    # this environment (or the repo-level secrets).
    environment: nuget

    permissions:
      # Needed so the workflow can publish the GitHub Release for the tag.
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # MinVer walks the git history for the nearest tag - the default
          # fetch-depth of 1 would lose that information.
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Expreszo.slnx

      - name: Build (Release)
        run: dotnet build Expreszo.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet run --project test/Expreszo.Tests/Expreszo.Tests.csproj --configuration Release --no-build -- --treenode-filter /*/*/*/*

      - name: Publish AotCheck (Native AOT)
        # Same safety net as the CI workflow - if anything in the library's
        # call graph needs dynamic code generation, this fails here rather
        # than in a consumer's publish pipeline.
        run: |
          dotnet publish samples/AotCheck/AotCheck.csproj \
            --configuration Release \
            --runtime linux-x64 \
            --self-contained \
            -p:PublishAot=true \
            --output ./aot-out

      - name: Run the AOT-published binary
        run: ./aot-out/Expreszo.AotCheck

      - name: Pack
        run: dotnet pack src/Expreszo/Expreszo.csproj --configuration Release --no-build --output ./artifacts

      - name: List package contents
        run: ls -la ./artifacts

      - name: Push to NuGet.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          dotnet nuget push "./artifacts/*.nupkg" \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Create GitHub Release
        # Only when this run was triggered by a tag push - skipped on manual
        # re-runs unless the caller re-tagged.
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref, '-') }}
          files: |
            ./artifacts/*.nupkg
            ./artifacts/*.snupkg
