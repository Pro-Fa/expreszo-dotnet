site_name: Expreszo .NET
site_description: Safe, extensible, AOT-friendly expression evaluator for .NET 10.
site_url: https://pro-fa.github.io/expreszo-dotnet/
repo_url: https://github.com/pro-fa/expreszo-dotnet
repo_name: pro-fa/expreszo-dotnet

theme:
  name: material
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
      auto_title: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - For Expression Writers:
    - Quick Reference: quick-reference.md
    - Expression Syntax: syntax.md
  - For Developers:
    - Parser: parser.md
    - Expression: expression.md
    - Advanced Features: advanced-features.md
    - Values & JsonDocument: values-and-json.md
    - Security & Validation: security.md
    - AOT & Trimming: aot-and-trimming.md
  - For Contributors:
    - Contributing: contributing.md
